services:
  postgres:
    image: postgres:16-alpine
    container_name: facturaguard-postgres
    environment:
      POSTGRES_USER: facturaguard
      POSTGRES_PASSWORD: facturaguard
      POSTGRES_DB: facturaguard
    ports:
      - "5432:5432"
    volumes:
      - facturaguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facturaguard -d facturaguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: facturaguard-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://facturaguard:facturaguard@postgres:5432/facturaguard
      - AUTO_CREATE_TABLES=false
      - FG_ENABLE_SCHEDULER=true
      - FG_STATUS_CHECK_INTERVAL_MINUTES=60
      - FG_EMAIL_DRY_RUN=true
      - SECRET_KEY=dev-only-change-me
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=120
      - FILE_STORAGE_PATH=/app/storage
    volumes:
      - ./backend:/app
      - facturaguard_storage:/app/storage
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: facturaguard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  facturaguard_postgres_data:
  facturaguard_storage:
